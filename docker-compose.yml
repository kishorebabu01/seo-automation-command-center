# ============================================
# Docker Compose - SEO Automation Stack
# ============================================
# This file creates 2 services:
# 1. PostgreSQL - database to store n8n data
# 2. n8n - the automation workflow engine
# ============================================

version: '3.8'

services:

  # ---- SERVICE 1: PostgreSQL Database ----
  # Why do we need this?
  # n8n needs to store your workflows, credentials,
  # and execution history somewhere. PostgreSQL is
  # a professional-grade database. Better than SQLite.
  
  postgres:
    image: postgres:15-alpine
    # 'image' means: download this pre-built mini-computer
    # postgres:15-alpine = PostgreSQL version 15, small size
    
    restart: always
    # If it crashes, restart automatically. Production behavior.
    
    environment:
      # These variables configure the database
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # The ${} syntax reads values from your .env file
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 'volumes' means: save database data permanently
      # Even if you restart Docker, data is not lost
    
    networks:
      - seo_network
    # Both services are on same private network
    # so they can talk to each other securely

  # ---- SERVICE 2: n8n Automation Engine ----
  
  n8n:
    image: n8nio/n8n:latest
    # n8nio/n8n = official n8n image, always latest version
    
    restart: always
    
    ports:
      - "5678:5678"
      # "your_computer:inside_container"
      # This means: when you go to localhost:5678
      # in your browser, it connects to n8n inside Docker
    
    environment:
      # Basic authentication - password protect your n8n
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      
      # Tell n8n to use PostgreSQL (not default SQLite)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      
      # n8n host settings
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      
      # Timezone - important for scheduled workflows
      GENERIC_TIMEZONE: Asia/Kolkata
      
    volumes:
      - n8n_data:/home/node/.n8n
      # Saves your workflows permanently
    
    networks:
      - seo_network
    
    depends_on:
      - postgres
      # Start PostgreSQL FIRST, then start n8n
      # n8n needs the database ready before it starts

# ---- VOLUMES ----
# These create permanent storage spaces on your computer
volumes:
  postgres_data:
  n8n_data:

# ---- NETWORKS ----
# Private network so services talk to each other
# but are isolated from everything else
networks:
  seo_network:
    driver: bridge